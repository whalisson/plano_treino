name: Deploy — GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build e deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injeta config Firebase a partir dos Secrets
        env:
          API_KEY:          ${{ secrets.FIREBASE_API_KEY }}
          AUTH_DOMAIN:      ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID:       ${{ secrets.FIREBASE_PROJECT_ID }}
          STORAGE_BUCKET:   ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          MESSAGING_SENDER: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID:           ${{ secrets.FIREBASE_APP_ID }}
        run: |
          printf 'var FIREBASE_CONFIG = {\n  apiKey: "%s",\n  authDomain: "%s",\n  projectId: "%s",\n  storageBucket: "%s",\n  messagingSenderId: "%s",\n  appId: "%s"\n};\n' \
            "$API_KEY" "$AUTH_DOMAIN" "$PROJECT_ID" "$STORAGE_BUCKET" "$MESSAGING_SENDER" "$APP_ID" \
            > js/firebase-config.js
          echo "✓ firebase-config.js gerado:"
          cat js/firebase-config.js

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v4

      - name: Faz upload dos arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
