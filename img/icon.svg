<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0c0c0f"/>
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)" opacity="0.6"/>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0c1a20"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7fff"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
  </defs>
  <!-- Barbell shaft -->
  <rect x="96" y="240" width="320" height="32" rx="16" fill="url(#bar-grad)" opacity="0.9"/>
  <!-- Left outer plate -->
  <rect x="88" y="184" width="32" height="144" rx="14" fill="#6c63ff"/>
  <!-- Left inner plate -->
  <rect x="136" y="204" width="22" height="104" rx="10" fill="#a59eff"/>
  <!-- Right outer plate -->
  <rect x="392" y="184" width="32" height="144" rx="14" fill="#6c63ff"/>
  <!-- Right inner plate -->
  <rect x="354" y="204" width="22" height="104" rx="10" fill="#a59eff"/>
  <!-- Center collar left -->
  <rect x="218" y="226" width="20" height="60" rx="8" fill="#4ade80" opacity="0.85"/>
  <!-- Center collar right -->
  <rect x="274" y="226" width="20" height="60" rx="8" fill="#4ade80" opacity="0.85"/>
</svg>
