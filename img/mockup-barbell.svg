<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" width="960" height="220">

  <!-- ══ BARRA ══ -->

  <!-- Sleeve esquerda -->
  <rect x="0" y="97" width="248" height="14" rx="4" fill="#9ca3af"/>
  <!-- Sleeve direita -->
  <rect x="712" y="97" width="248" height="14" rx="4" fill="#9ca3af"/>

  <!-- Shaft suave esquerdo -->
  <rect x="248" y="96" width="90" height="16" rx="3" fill="#6b7280"/>
  <!-- Shaft suave direito -->
  <rect x="622" y="96" width="90" height="16" rx="3" fill="#6b7280"/>

  <!-- Knurling (centro) -->
  <rect x="338" y="94" width="284" height="20" rx="3" fill="#374151"/>
  <!-- linhas de knurling -->
  <line x1="358" y1="96" x2="346" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="372" y1="96" x2="360" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="386" y1="96" x2="374" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="400" y1="96" x2="388" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="414" y1="96" x2="402" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="428" y1="96" x2="416" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="442" y1="96" x2="430" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="456" y1="96" x2="444" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="470" y1="96" x2="458" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="484" y1="96" x2="472" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="498" y1="96" x2="486" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="512" y1="96" x2="500" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="526" y1="96" x2="514" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="540" y1="96" x2="528" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="554" y1="96" x2="542" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="568" y1="96" x2="556" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="582" y1="96" x2="570" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="596" y1="96" x2="584" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>
  <line x1="610" y1="96" x2="598" y2="112" stroke="#6b7280" stroke-width="1.2" opacity="0.6"/>

  <!-- ══ COLARES ══ -->
  <!-- Colar esquerdo (trapezoide: largo fora, estreito dentro) -->
  <polygon points="224,68  248,76  248,132  224,140" fill="#374151" stroke="#1f2937" stroke-width="1.5"/>
  <!-- Colar direito (espelhado) -->
  <polygon points="712,76  736,68  736,140  712,132" fill="#374151" stroke="#1f2937" stroke-width="1.5"/>

  <!-- ══ ANILHAS LADO ESQUERDO (do interior para fora: 25 → 20 → 15) ══ -->

  <!-- 25 kg — VERMELHA — mais interna -->
  <rect x="196" y="20" width="28" height="168" rx="10" fill="#b91c1c" stroke="#111" stroke-width="3"/>
  <rect x="199" y="23" width="22" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>
  <ellipse cx="210" cy="104" rx="6" ry="7" fill="#060a14" stroke="#000" stroke-width="1"/>
  <text transform="rotate(-90,210,104)" x="210" y="108" text-anchor="middle" fill="rgba(255,255,255,.9)" font-size="11" font-family="monospace" font-weight="800">25</text>

  <!-- 20 kg — AZUL -->
  <rect x="167" y="32" width="26" height="144" rx="9" fill="#2563eb" stroke="#111" stroke-width="3"/>
  <rect x="170" y="35" width="20" height="9" rx="4" fill="rgba(255,255,255,0.22)"/>
  <ellipse cx="180" cy="104" rx="5.5" ry="6.5" fill="#060a14" stroke="#000" stroke-width="1"/>
  <text transform="rotate(-90,180,104)" x="180" y="108" text-anchor="middle" fill="rgba(255,255,255,.9)" font-size="10" font-family="monospace" font-weight="800">20</text>

  <!-- 15 kg — AMARELA -->
  <rect x="141" y="46" width="23" height="116" rx="8" fill="#ca8a04" stroke="#111" stroke-width="3"/>
  <rect x="144" y="49" width="17" height="8" rx="3.5" fill="rgba(255,255,255,0.22)"/>
  <ellipse cx="152.5" cy="104" rx="5" ry="5.5" fill="#060a14" stroke="#000" stroke-width="1"/>
  <text transform="rotate(-90,152.5,104)" x="152.5" y="108" text-anchor="middle" fill="rgba(255,255,255,.9)" font-size="9" font-family="monospace" font-weight="800">15</text>

  <!-- ══ ANILHAS LADO DIREITO (espelhadas: 25 → 20 → 15) ══ -->

  <!-- 25 kg — VERMELHA -->
  <rect x="736" y="20" width="28" height="168" rx="10" fill="#b91c1c" stroke="#111" stroke-width="3"/>
  <rect x="739" y="23" width="22" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>
  <ellipse cx="750" cy="104" rx="6" ry="7" fill="#060a14" stroke="#000" stroke-width="1"/>
  <text transform="rotate(90,750,104)" x="750" y="108" text-anchor="middle" fill="rgba(255,255,255,.9)" font-size="11" font-family="monospace" font-weight="800">25</text>

  <!-- 20 kg — AZUL -->
  <rect x="767" y="32" width="26" height="144" rx="9" fill="#2563eb" stroke="#111" stroke-width="3"/>
  <rect x="770" y="35" width="20" height="9" rx="4" fill="rgba(255,255,255,0.22)"/>
  <ellipse cx="780" cy="104" rx="5.5" ry="6.5" fill="#060a14" stroke="#000" stroke-width="1"/>
  <text transform="rotate(90,780,104)" x="780" y="108" text-anchor="middle" fill="rgba(255,255,255,.9)" font-size="10" font-family="monospace" font-weight="800">20</text>

  <!-- 15 kg — AMARELA -->
  <rect x="796" y="46" width="23" height="116" rx="8" fill="#ca8a04" stroke="#111" stroke-width="3"/>
  <rect x="799" y="49" width="17" height="8" rx="3.5" fill="rgba(255,255,255,0.22)"/>
  <ellipse cx="807.5" cy="104" rx="5" ry="5.5" fill="#060a14" stroke="#000" stroke-width="1"/>
  <text transform="rotate(90,807.5,104)" x="807.5" y="108" text-anchor="middle" fill="rgba(255,255,255,.9)" font-size="9" font-family="monospace" font-weight="800">15</text>

</svg>
